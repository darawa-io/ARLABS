<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Optics Lab — Converging Lens</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0e1a;font-family:'Outfit',sans-serif;overflow:hidden;height:100vh;width:100vw;color:#e8f4ff;}

/* ── Desktop sim canvas ── */
#simWrap{position:absolute;inset:0;z-index:1;}
#mainCanvas{position:absolute;inset:0;}
#labelCanvas{position:absolute;top:0;left:0;pointer-events:none;z-index:3;}

/* ── AR.js scene wrapper ── */
#arWrap{display:none;position:absolute;inset:0;z-index:2;}
#arWrap.show{display:block;}

/* ── HUD ── */
#hud{position:absolute;top:20px;right:20px;background:rgba(8,18,35,.9);backdrop-filter:blur(20px);border:1px solid rgba(100,200,255,.2);border-radius:16px;padding:16px;min-width:218px;z-index:10;}
#hud h2{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(100,200,255,.55);text-transform:uppercase;margin-bottom:12px;border-bottom:1px solid rgba(100,200,255,.1);padding-bottom:8px;}
.dr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;padding:5px 8px;border-radius:7px;background:rgba(100,200,255,.04);}
.dl{font-family:'Space Mono',monospace;font-size:11px;color:rgba(180,220,255,.7);}
.dv{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#64c8ff;}
.dv.g{color:#7fffb2;}.dv.w{color:#ffb347;}
.hdiv{height:1px;background:rgba(100,200,255,.1);margin:10px 0;}
#image-info{padding:7px 8px;border-radius:7px;background:rgba(127,255,178,.05);border:1px solid rgba(127,255,178,.14);font-size:11px;font-family:'Space Mono',monospace;color:#7fffb2;line-height:1.9;}

/* ── PiP ── */
#pip{position:absolute;top:20px;left:200px;width:128px;height:128px;background:#06101a;border:1px solid rgba(127,255,178,.3);border-radius:10px;overflow:hidden;z-index:10;}
#pip canvas{width:100%;height:100%;display:block;}
#pip-label{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-family:'Space Mono',monospace;font-size:8px;color:rgba(127,255,178,.5);letter-spacing:1px;pointer-events:none;}

/* ── Controls ── */
#controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;background:rgba(8,18,35,.9);backdrop-filter:blur(20px);border:1px solid rgba(100,200,255,.2);border-radius:50px;padding:8px 16px;z-index:10;flex-wrap:wrap;justify-content:center;}
.btn{padding:7px 14px;border-radius:30px;border:1px solid rgba(100,200,255,.3);background:rgba(100,200,255,.08);color:#64c8ff;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;outline:none;-webkit-tap-highlight-color:transparent;}
.btn:hover{background:rgba(100,200,255,.2);}
.btn.on{background:rgba(100,200,255,.28);border-color:#64c8ff;color:#fff;box-shadow:0 0 12px rgba(100,200,255,.3);}
.btn.amber{border-color:rgba(255,180,60,.4);color:#ffb43c;background:rgba(255,180,60,.06);}
.btn.amber.on{background:rgba(255,180,60,.22);border-color:#ffb43c;color:#fff;}
.btn.green{border-color:rgba(60,220,120,.5);color:#3fdc78;background:rgba(60,220,120,.06);}
.btn.green.on
