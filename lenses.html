<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Optics Lab — Converging Lens</title>

<style>
body{margin:0;background:#000;color:white;font-family:sans-serif;overflow:hidden;}
#simWrap{position:absolute;inset:0;}
#arWrap{display:none;position:absolute;inset:0;}
#arWrap.show{display:block;}
#controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);}
button{padding:10px 16px;font-size:14px;}
</style>
</head>

<body>

<div id="simWrap">
  <canvas id="mainCanvas"></canvas>
</div>

<div id="arWrap"></div>

<div id="controls">
  <button id="btn-ar">📷 AR Mode</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let arMode = false;
let arScene = null;
let arEntities = {};
let arScale = 1.2; // bigger default
let initialPinchDistance = null;

const S = {
  focalLength:15,
  objectDist:30,
  screenDist:30,
  objectHeight:10
};

const CM = 0.1;

// ======================
// ENTER AR
// ======================
document.getElementById('btn-ar').onclick = () => {
  if(!arMode) enterAR();
  else exitAR();
};

function enterAR(){
  arMode = true;
  document.getElementById('simWrap').style.display='none';
  document.getElementById('arWrap').classList.add('show');
  loadAR();
}

// ======================
// LOAD AR LIBS
// ======================
function loadAR(){

  function start(){
    setTimeout(()=> buildARScene(),300);
  }

  if(window.AFRAME){
    start(); return;
  }

  const s1=document.createElement('script');
  s1.src="https://aframe.io/releases/1.4.0/aframe.min.js";
  s1.onload=()=>{
    const s2=document.createElement('script');
    s2.src="https://cdn.jsdelivr.net/npm/ar.js@2.3.4/aframe/build/aframe-ar.js";
    s2.onload=start;
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

// ======================
// BUILD AR SCENE
// ======================
function buildARScene(){

  const wrap = document.getElementById('arWrap');
  wrap.innerHTML = '';

  const sceneEl = document.createElement('a-scene');

  sceneEl.setAttribute('embedded','');
  sceneEl.setAttribute('vr-mode-ui','enabled:false');

  // ✅ FORCE REAR CAMERA
  sceneEl.setAttribute('arjs',{
    sourceType:'webcam',
    facingMode:'environment',
    debugUIEnabled:false
  });

  const marker = document.createElement('a-marker');
  marker.setAttribute('preset','hiro');

  const scaleGroup = document.createElement('a-entity');
  scaleGroup.setAttribute('id','scaleGroup');
  scaleGroup.setAttribute('scale',`${arScale} ${arScale} ${arScale}`);

  // ======================
  // OBJECT
  // ======================
  const obj = document.createElement('a-box');
  obj.setAttribute('color','red');
  obj.setAttribute('depth','0.05');
  obj.setAttribute('height','0.5');
  obj.setAttribute('width','0.05');
  obj.setAttribute('position','-1 0.25 0');

  // ======================
  // LENS
  // ======================
  const lens = document.createElement('a-sphere');
  lens.setAttribute('color','lightblue');
  lens.setAttribute('radius','0.2');
  lens.setAttribute('scale','0.3 1 0.3');
  lens.setAttribute('position','0 0.2 0');

  // ======================
  // SCREEN
  // ======================
  const screen = document.createElement('a-plane');
  screen.setAttribute('color','green');
  screen.setAttribute('width','0.4');
  screen.setAttribute('height','0.5');
  screen.setAttribute('rotation','0 90 0');
  screen.setAttribute('position','1 0.3 0');

  scaleGroup.appendChild(obj);
  scaleGroup.appendChild(lens);
  scaleGroup.appendChild(screen);

  marker.appendChild(scaleGroup);

  const cam = document.createElement('a-entity');
  cam.setAttribute('camera','');

  sceneEl.appendChild(marker);
  sceneEl.appendChild(cam);

  wrap.appendChild(sceneEl);

  arScene = sceneEl;
  arEntities = {scaleGroup};

  // ======================
  // TOUCH EVENTS
  // ======================
  wrap.addEventListener('touchstart',onTouchStart,{passive:false});
  wrap.addEventListener('touchmove',onTouchMove,{passive:false});
  wrap.addEventListener('touchend',onTouchEnd,{passive:false});
}

// ======================
// PINCH ZOOM
// ======================
function getDistance(touches){
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.hypot(dx,dy);
}

function onTouchStart(e){
  e.preventDefault();

  if(e.touches.length===2){
    initialPinchDistance = getDistance(e.touches);
  }
}

function onTouchMove(e){
  e.preventDefault();

  if(e.touches.length===2){
    const newDist = getDistance(e.touches);

    if(initialPinchDistance){
      const scaleFactor = newDist / initialPinchDistance;
      arScale *= scaleFactor;

      arScale = Math.max(0.3, Math.min(3, arScale));

      arEntities.scaleGroup.setAttribute(
        'scale',
        `${arScale} ${arScale} ${arScale}`
      );
    }

    initialPinchDistance = newDist;
  }
}

function onTouchEnd(e){
  if(e.touches.length < 2){
    initialPinchDistance = null;
  }
}

// ======================
// EXIT AR
// ======================
function exitAR(){
  arMode = false;
  document.getElementById('simWrap').style.display='';
  document.getElementById('arWrap').classList.remove('show');
  document.getElementById('arWrap').innerHTML='';
}
</script>

</body>
</html>
